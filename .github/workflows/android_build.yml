name: Android Engine CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Gradle Wrapper
      # The Ubuntu runner contains a system-level Gradle installation.
      # This step checks for the gradlew executable. If it does not exist,
      # it generates the wrapper natively, ensuring all checksums and 
      # properties files are perfectly aligned for the build environment.
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Gradle wrapper not found in repository. Bootstrapping..."
          gradle wrapper --gradle-version 8.6 --distribution-type all
        else
          echo "Gradle wrapper exists."
        fi
        # Ensure the script has execution permissions
        chmod +x gradlew

    - name: Setup Gradle Cache & Environment
      # This official action intercepts the Gradle execution to cache dependencies,
      # Android SDK components, and the NDK build outputs. 
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper

    - name: Compile Procedural Engine & Build APK
      # Executes the assembly. This triggers CMake to compile Engine.cpp, 
      # Renderer.cpp, etc., before packaging them into the final Android application.
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK Artifact
      # Captures the successfully compiled application and attaches it to the workflow run.
      uses: actions/upload-artifact@v4
      with:
        name: ProceduralEngine-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
