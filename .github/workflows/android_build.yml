name: Android CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Generate Gradle Wrapper
      # This uses the runner's pre-installed Gradle to generate gradlew and the wrapper folder.
      # Gradle 8.7 is highly compatible with modern Android development and C++ NDK builds.
      run: gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle (Includes NDK C++ build)
      run: ./gradlew assembleDebug
