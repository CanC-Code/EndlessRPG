name: Build Procedural 3D Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Portable Blender
        run: |
          curl -L https://mirrors.ocf.berkeley.edu/blender/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz -o blender.tar.xz
          tar -xvf blender.tar.xz --strip-components=1
          echo "$(pwd)" >> $GITHUB_PATH

      - name: Run Project Scaffolder
        run: bash scripts/setup_project.sh

      - name: Execute Runtime Content Generation
        run: |
          chmod +x runtime/generate_game.sh
          ./runtime/generate_game.sh

      - name: Initialize Gradle Wrapper
        run: gradle wrapper # This creates the 'gradlew' file

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProceduralGame-Debug
          path: app/build/outputs/apk/debug/*.apk
