name: Build Procedural 3D Game
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Blender (Fast Portable)
        uses: xfactus/setup-blender@v2
        with:
          version: '4.0.2'

      - name: Run Project Scaffolder
        run: bash scripts/setup_project.sh

      - name: Execute Runtime Content Generation
        run: |
          chmod +x runtime/generate_game.sh
          ./runtime/generate_game.sh

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ProceduralGame-Debug
          path: app/build/outputs/apk/debug/*.apk
