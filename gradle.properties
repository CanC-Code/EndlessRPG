# Enables AndroidX package structure, required for androidx.* dependencies
android.useAndroidX=true

# Automatically converts third-party libraries to use AndroidX
android.enableJetifier=true

# Specifies the JVM arguments used for the Gradle daemon process.
# Allocating 2GB of RAM prevents the GitHub Actions runner from timing out 
# or crashing during the heavy C++ NDK engine compilation.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
